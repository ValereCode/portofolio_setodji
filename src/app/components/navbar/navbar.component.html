<nav [class.scrolled]="scrolled" [class.menu-open]="menuOpen">
  <div class="nav-inner">
    <a class="logo" (click)="scrollTo('#hero')">
      <span class="logo-bracket">&lt;</span>
      <span class="logo-name">SETODJI</span>
      <span class="logo-bracket">/&gt;</span>
    </a>

    <ul class="nav-links" [class.open]="menuOpen">
      <li *ngFor="let link of links; let i = index">
        <a (click)="scrollTo(link.href)">
          <span class="link-num">0{{ i + 1 }}.</span>
          {{ link.label }}
        </a>
      </li>
      <li>
        <a class="btn-glow" (click)="scrollTo('#contact')">Me contacter</a>
      </li>
    </ul>

    <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
